name: Build and Push to GHCR

on:
  push:
    branches: [ "main" ] # 只有 push 到 main 分支时触发
  release:
    types: [published] # 发布 release 时也触发

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # 格式为: 用户名/仓库名

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: # 关键：必须赋予写入 Packages 的权限
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 登录到 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 提取元数据（自动生成标签，如 :latest 或 :v1.0.0）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      # 3. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}
